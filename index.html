<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardiões da Homeostase</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="home">
    <header class="hero">
      <img src="imagens/logo.png" alt="Logo Guardiões da Homeostase" class="logo" />
    </header>

    <section class="cards" aria-label="Acessos principais">
      <a href="podcast.html" class="card-link" aria-label="Ir para a página de Podcast">
        <article class="card podcast-card">
          <img src="imagens/image 4 (2).png" alt="Botão Podcast" class="card-image" />
          <span class="card-glow"></span>
        </article>
      </a>

      <a href="diarios.html" class="card-link" aria-label="Ir para a página de Diários">
        <article class="card diarios-card">
          <img src="imagens/image 5.png" alt="Botão Diários" class="card-image" />
          <span class="card-glow"></span>
        </article>
      </a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
