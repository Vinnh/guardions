<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podcast | Guardiões da Homeostase</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body class="podcast-page">
  <header class="top-logo">
    <a href="index.html">
      <img src="imagens/logo.png" alt="Guardiões da Homeostase" class="logo-top" />
    </a>
  </header>

  <main class="podcast-layout">
    <section class="player-card">
      <img
        id="podcastCover"
        src="imagens/image 4 (2).png"
        alt="Capa do episódio"
        class="podcast-cover"
      />

      <h1 id="podcastTitle" class="podcast-title">Nome do episódio</h1>

      <div class="progress-section">
        <span id="currentTime" class="time-text">0:00</span>

        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb"></div>
        </div>

        <span id="duration" class="time-text">0:00</span>
      </div>

      <div class="player-controls">
        <div></div>

        <div class="center-controls">
          <button class="icon-btn" id="prevBtn" title="Episódio anterior">
            <i class="fa-solid fa-backward-step"></i>
          </button>

          <button class="play-btn" id="playPauseBtn" title="Reproduzir">
            <i class="fa-solid fa-play" id="playPauseIcon"></i>
          </button>

          <button class="icon-btn" id="nextBtn" title="Próximo episódio">
            <i class="fa-solid fa-forward-step"></i>
          </button>
        </div>

        <button class="icon-btn" id="togglePlaylistBtn" title="Ver episódios">
          <i class="fa-solid fa-list-ul"></i>
        </button>
      </div>

      <audio id="audioPlayer"></audio>
    </section>

    <aside class="playlist-panel" id="playlistPanel">
      <div class="playlist-header">
        <h2><i class="fa-solid fa-list-ul"></i> Episódios</h2>
        <button class="close-playlist" id="closePlaylistBtn" title="Fechar lista">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="episode-list" id="episodeList">
        <!-- Episódios inseridos pelo JS -->
      </div>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
